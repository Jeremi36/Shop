services:
  - type: web
    name: deutscher-shop
    runtime: node
    plan: free
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: STAFF_EMAIL
        sync: false
      - key: STAFF_PASSWORD
        sync: false
