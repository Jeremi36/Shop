services:
  - type: web
    name: premium-shop
    runtime: node
    plan: free
    buildCommand: npm install && npm run migrate
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: STAFF_EMAIL
        sync: false
      - key: STAFF_PASSWORD
        sync: false

# Optional für E-Mails über Resend:
# RESEND_API_KEY, MAIL_FROM und APP_URL in Render Environment Variables setzen.
