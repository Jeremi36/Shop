services:
  - type: web
    name: premium-shop
    runtime: node
    plan: free
    buildCommand: npx pnpm@9.15.4 install && npx pnpm@9.15.4 run migrate
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: MAILERSEND_API_KEY
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
