services:
  - type: web
    name: premium-shop
    runtime: node
    plan: free
    buildCommand: npx pnpm@9.15.4 install --frozen-lockfile && npx pnpm@9.15.4 run migrate
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 20
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: PAYPAL_ME_LINK
        sync: false
      - key: PAYPAL_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: MAIL_FROM
        value: Premium Shop <info@premium-shop.com>
      - key: MAIL_REPLY_TO
        value: info@premium-shop.com
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
